# 1. The Handshake (Tells Traefik to handle this)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik-gateway-class
spec:
  controllerName: traefik.io/gateway-controller
---
# 2. The Entry Point (Logical Load Balancer)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kitchen-gateway
  namespace: kitchen-sre
spec:
  gatewayClassName: traefik-gateway-class
  listeners:
  - name: web
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-route
  namespace: kitchen-sre
spec:
  parentRefs:
  - name: kitchen-gateway
    namespace: kitchen-sre
    sectionName: web
  hostnames:
  - "ops.kitchen.local"
  - "sentinel.prime.io"
  - "ghost.vision.ai"
  - "monitor.sre.local"
  - "matrix.ops.io"
  - "foundry.labs.dev"
  - "signal.core.net"
  rules:
  - backendRefs:
    - name: dashboard-ui
      port: 8501         
---
# 4. The Internal Bridge
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
  namespace: kitchen-sre
spec:
  type: ClusterIP 
  selector:
    app: dashboard       
  ports:
  - name: http
    port: 8501           
    targetPort: 8501
