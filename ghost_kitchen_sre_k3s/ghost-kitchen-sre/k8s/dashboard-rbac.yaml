apiVersion: v1
kind: ServiceAccount
metadata:
  name: elite-dashboard-sa
  namespace: kitchen-sre
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-operator-role
  namespace: kitchen-sre
rules:
- apiGroups: [""]
  # Dashboard needs to list pods for security scans and delete them for rogue pod removal
  resources: ["pods", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  # Dashboard needs scale permissions to execute your manual approvals
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-operator-binding
  namespace: kitchen-sre
subjects:
- kind: ServiceAccount
  name: elite-dashboard-sa
  namespace: kitchen-sre
roleRef:
  kind: Role
  name: dashboard-operator-role
  apiGroup: rbac.authorization.k8s.io
