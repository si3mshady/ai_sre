# gateway-infra.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kitchen-gateway
  namespace: kitchen-sre
spec:
  gatewayClassName: traefik
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "sentinel-ops.duckdns.org"
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sentinel-route
  namespace: kitchen-sre
spec:
  parentRefs:
  - name: kitchen-gateway
  hostnames: ["sentinel-ops.duckdns.org"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: /api }
    backendRefs:
    - name: kitchen-agent # Directs to your Agent service
      port: 80
  - matches:
    - path: { type: PathPrefix, value: /rag }
    backendRefs:
    - name: rag-service # Directs to your RAG service
      port: 8080
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: dashboard-ui  # Directs to your Streamlit UI
      port: 8501
