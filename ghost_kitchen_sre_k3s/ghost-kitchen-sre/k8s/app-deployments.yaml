apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-agent
  namespace: kitchen-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      serviceAccountName: sre-agent-sa
      containers:
      - name: agent
        imagePullPolicy: Always
        image: si3mshady/aiops:agent-v2
        env:
        - name: BOOTSTRAP_SERVERS
          value: "redpanda-0.redpanda.kitchen-sre.svc.cluster.local:9092"
        # No KITCHEN_CONFIG_PATH or volumeMounts needed if logic is internal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-producer
  namespace: kitchen-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
      - name: producer
        imagePullPolicy: Always
        command: ["python",  "kitchen_producer.py"]
        image: si3mshady/aiops:producer-v2
        env:
        - name: BOOTSTRAP_SERVERS
          value: "redpanda-0.redpanda.kitchen-sre.svc.cluster.local:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-dashboard
  namespace: kitchen-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: si3mshady/aiops:dashboard-v3
        imagePullPolicy: Always  
        ports:
        - containerPort: 8501
        env:
        - name: BOOTSTRAP_SERVERS
          value: "redpanda-0.redpanda.kitchen-sre.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
  namespace: kitchen-sre
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 8501
    targetPort: 8501
    nodePort: 30501
