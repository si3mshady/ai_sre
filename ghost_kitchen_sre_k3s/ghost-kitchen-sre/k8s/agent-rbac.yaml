apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent-sa
  namespace: kitchen-sre
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-role
rules:
- apiGroups: ["apps", ""]
  resources: ["deployments", "deployments/scale", "pods", "services"]
  verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-agent-binding
subjects:
- kind: ServiceAccount
  name: sre-agent-sa
  namespace: kitchen-sre
roleRef:
  kind: ClusterRole
  name: sre-agent-role
  apiGroup: rbac.authorization.k8s.io
