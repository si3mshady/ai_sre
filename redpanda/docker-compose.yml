version: "3.9"

networks:
  eventnet:

services:

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    networks:
      - eventnet

  console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    ports:
      - "8080:8080"
    networks:
      - eventnet
    environment:
      KAFKA_BROKERS: redpanda:9092

  ollama:
    container_name: ollama
    image: ollama/ollama
    # Keeping your existing command structure intact
    command: serve #&
      #sleep 10 &&
      #ollama pull llama3.2:3b &&
      #wait
    ports:
      - "11435:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    networks:
      - eventnet
    # Healthcheck to verify the model is actually present on disk
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'llama3'"]
      interval: 10s
      timeout: 5s
      retries: 5 # Up to ~6.5 minutes for CPU-only downloads
      start_period: 15s

  edge-producer:
    image: python:3.11
    volumes:
      - ./producer:/app
    working_dir: /app
    command: >
      sh -c "pip install kafka-python &&
             python edge_device.py"
    depends_on:
      - redpanda
    networks:
      - eventnet

  ai-agent:
    image: python:3.11
    volumes:
      - ./agents:/app
    working_dir: /app
    command: >
      sh -c "pip install kafka-python fastapi uvicorn requests &&
             python ai_agent.py"
    depends_on:
      redpanda:
        condition: service_started
      ollama:
        condition: service_healthy # This forces the agent to wait for the download
    networks:
      - eventnet
    extra_hosts:
    - "host.docker.internal:host-gateway"

  dashboard:
    image: python:3.11
    volumes:
      - ./dashboard:/app
    working_dir: /app
    command: >
      sh -c "pip install kafka-python streamlit pandas &&
             streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - redpanda
    networks:
      - eventnet


  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    #image: flink:1.19-scala_2.12
    container_name: flink-jobmanager
    command: jobmanager
    #command: >
    # bash -c "
    # /docker-entrypoint.sh jobmanager &
    #      sleep 15 &&
    # flink run -py /opt/flink/jobs/process_events.py"
    volumes:
    - ./flink_jobs:/opt/flink/jobs  
    ports:
      - "8081:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - eventnet

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    #image: flink:1.19-scala_2.12

    container_name: flink-taskmanager
    volumes:
    - ./flink_jobs:/opt/flink/jobs  
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - eventnet        
volumes:
  ollama:
