version: "3.9"

networks:
  kitchen-net:
    driver: bridge

volumes:
  redpanda_data:
  flink_data:
  grafana_data:
  prometheus_data:
  ollama_data:

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    command:
      - redpanda start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --mode=dev-container
    ports:
      - "19092:19092"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - kitchen-net
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - kitchen-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - kitchen-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  kitchen-producer:
    build: 
      context: .
      dockerfile: Dockerfile.producer
    volumes:
      - ./producer:/app
      - ./config:/app/config:ro
    environment:
      - TENANT_ID=tenant1
      - BOOTSTRAP_SERVERS=redpanda:9092
      - KITCHEN_CONFIG_PATH=/app/config/tenant1.yaml
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - kitchen-net
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"
    volumes:
      - flink_data:/opt/flink/data
      - ./flink_jobs:/opt/flink/jobs:ro
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - kitchen-net
    command: jobmanager

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - flink-jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - kitchen-net
    command: taskmanager

  kitchen-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    volumes:
      - ./agents:/app
      - ./config:/app/config:ro
    environment:
      - BOOTSTRAP_SERVERS=redpanda:9092
      - KITCHEN_CONFIG_PATH=/app/config/tenant1.yaml
    depends_on:
      ollama:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - kitchen-net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    depends_on:
      - redpanda
    networks:
      - kitchen-net
    command: streamlit run elite_dashboard.py --server.port 8501 --server.address 0.0.0.0

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - kitchen-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    # IMPORTANT: set admin password via environment / .env, not hardcoded
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-change_me}
    networks:
      - kitchen-net
